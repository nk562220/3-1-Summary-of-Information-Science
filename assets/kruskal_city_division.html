              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"borderWidth": 3, "color": "#8CC0EB", "font": {"color": "white"}, "id": 1, "label": "v1", "shape": "dot", "size": 28}, {"borderWidth": 3, "color": "#8CC0EB", "font": {"color": "white"}, "id": 2, "label": "v2", "shape": "dot", "size": 28}, {"borderWidth": 3, "color": "#8CC0EB", "font": {"color": "white"}, "id": 3, "label": "v3", "shape": "dot", "size": 28}, {"borderWidth": 3, "color": "#BFDDF0", "font": {"color": "white"}, "id": 4, "label": "v4", "shape": "dot", "size": 28}, {"borderWidth": 3, "color": "#8CC0EB", "font": {"color": "white"}, "id": 5, "label": "v5", "shape": "dot", "size": 28}]);
                  edges = new vis.DataSet([{"color": "#8CC0EB", "from": 1, "label": "1", "title": "MST \uac04\uc120", "to": 2, "width": 5}, {"color": "#8CC0EB", "from": 1, "label": "2", "title": "MST \uac04\uc120", "to": 3, "width": 5}, {"color": "#8CC0EB", "from": 3, "label": "2", "title": "MST \uac04\uc120", "to": 5, "width": 5}, {"color": "#444444", "from": 2, "label": "3", "to": 3, "width": 2}, {"color": "#FFEBCD", "dashes": true, "from": 2, "label": "4", "title": "\uc81c\uac70\ub41c \ucd5c\ub300 \ube44\uc6a9 \uac04\uc120", "to": 4, "width": 6}, {"color": "#444444", "from": 3, "label": "5", "to": 4, "width": 2}, {"color": "#444444", "from": 4, "label": "6", "to": 5, "width": 2}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"nodes": {"shape": "dot", "scaling": {"min": 16, "max": 32}}, "edges": {"smooth": {"type": "dynamic"}, "font": {"size": 16, "color": "white", "strokeWidth": 0}}, "physics": {"barnesHut": {"gravitationalConstant": -3000, "springLength": 180, "springConstant": 0.04}, "minVelocity": 0.75}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
